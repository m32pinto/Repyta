name: Build Linux AppImage

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyautogui pyperclip

      - name: 🔨 Build with PyInstaller
        run: |
          pyinstaller --onefile --name="Repyta" repyta.py

      - name: 📦 Create AppImage
        run: |
          # Baixa linuxdeploy
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          
          # Cria pasta para o AppImage
          mkdir -p AppDir/usr/bin
          cp dist/Repyta AppDir/usr/bin/
          
          # Cria o desktop file
          cat > AppDir/Repyta.desktop << EOF
          [Desktop Entry]
          Type=Application
          Name=Repyta
          Exec=Repyta
          Icon=Repyta
          Categories=Utility;
          EOF
          
          # Cria ícone simples (opcional)
          # Se tiver um ícone .png, coloque em AppDir/Repyta.png
          
          # Gera o AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Repyta-Linux-AppImage
          path: Repyta-*.AppImage
          retention-days: 30
