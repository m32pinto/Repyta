name: Build Windows Executable

on:
  push:
    paths:
      - 'repyta/interface.py'
      - 'repyta/*.py'
      - 'repyta/Repyta.spec'
    branches:
      - main
      - master
  workflow_dispatch:  # Permite executar manualmente

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # Se tiver requirements.txt:
        # pip install -r requirements.txt
        
    - name: Build with PyInstaller
      run: |
        cd repyta
        # Usando o arquivo .spec (recomendado)
        pyinstaller Repyta.spec
        # OU se preferir comando direto:
        # pyinstaller --onefile --noconsole --name="Repyta" repyta.py
        
    - name: Verify build
      run: |
        cd repyta/dist
        dir
        
    - name: Upload executable as artifact
      uses: actions/upload-artifact@v4
      with:
        name: Repyta-Windows-Executable
        path: repyta/dist/Repyta.exe
        retention-days: 30
        
    - name: Create Release (se for tag)
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: repyta/dist/Repyta.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
